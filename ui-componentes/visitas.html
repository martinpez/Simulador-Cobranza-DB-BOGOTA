<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargar Excel</title>
    <style>
        .containerEX {
            text-align: center;
        }

        .container-buttonEX {
            margin: 20px;
            text-align: center;
        }

        .btn-bogotaEX {
            background-color: #004481;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn-bogotaEX:hover {
            scale: 1.1;
            background-color: #004481;
            color: #fff;
            box-shadow: rgb(83, 104, 141) 0px 4px 6px 0px;
        }
    </style>
</head>

<body class="text-center mt-5">
    <div class="containerEX">
        <input type="file" id="inputPoblamientoOficina" accept=".xlsx, .xls" class="form-control mb-3"
            style="width: 100%; max-width: 600px; margin: 0 auto; font-size: 1rem; padding: 8px;" />
    </div>
    <div class="container-buttonEX">
        <button id="btnCargarOficina" class="btn btn-bogotaEX" style="margin-right: 10px;">Cargar Csv</button>
        <button id="btnEliminarOficina" class="btn btn-bogotaEX" style="margin-left: 10px;">Eliminar datos de hoy</button>
    </div>
</body>

</html>
