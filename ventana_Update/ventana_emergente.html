<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .popup {
      display: flex;
      width: max-content;
      max-width: 95vw;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    /* Close button */
    .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      color: #a59c9c;
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      z-index: 10;
    }
    .close-btn:hover { color: #0c0c0c; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay">
    <div class="popup">
      <button class="close-btn" onclick="closePopup()" aria-label="Cerrar">✕</button>
                <!-- URL IMG DESPUES DE PASAR A PRODUCION -->  
                 <!--https://res.cloudinary.com/dnah225js/image/upload/v1773335196/despuesUpdate_getoyi.png-->
                  <!-- URL IMG ANTES DE PASO A PRODUCCION -->
                   <!--https://res.cloudinary.com/dnah225js/image/upload/v1773335208/actualizacion_llgl8b.png-->
      <img src="https://res.cloudinary.com/dnah225js/image/upload/v1773335208/actualizacion_llgl8b.png" alt="imagen" width="950px" height="500px">
    </div>
  </div>
  <script>
    function closePopup() {
      const overlay = document.getElementById('overlay');
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 0.25s ease';
      setTimeout(() => overlay.style.display = 'none', 250);
      setTimeout(()=>{
          document.querySelector('.col-md-Infinity[id="09cb8ef7-693e-4b6e-b329-a205b256182c"]').remove();
      },200)
     
    }

    document.getElementById('overlay').addEventListener('click', function(e) {
      if (e.target === this) closePopup();
    });
  </script>

</body>
</html>
