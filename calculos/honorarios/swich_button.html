<div class="honorarios-container">
    <label class="switch">
        <input id="check" type="checkbox">
        <span class="slider">
            <span class="text-on">SÍ</span>
            <span class="text-off">NO</span>
        </span>
    </label>
    <label class="honorarios-label" for="check">¿Aplica honorarios?</label>
</div>
<style>
    .honorarios-container {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
    }

    .honorarios-label {
        font-size: 16px;
        font-weight: 600;
        color: #000000;
        cursor: pointer;
        user-select: none;
    }

    .switch {
        font-size: 17px;
        position: relative;
        display: inline-block;
        width: 4em;
        height: 2em;

    }

    /* Switch internal text */
    .text-on,
    .text-off {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 13px;
        font-weight: 700;
        transition: all 0.4s cubic-bezier(0.215, 0.610, 0.355, 1);
        pointer-events: none;
    }

    .text-on {
        left: 0.6em;
        color: #0041a4;
        opacity: 0;
        transform: translateY(-50%) translateX(-10px);
    }

    .text-off {
        right: 0.6em;
        color: #0041a4;
        opacity: 1;
        transform: translateY(-50%) translateX(0);
    }

    .switch input:checked+.slider .text-on {
        opacity: 1;
        transform: translateY(-50%) translateX(0);
    }

    .switch input:checked+.slider .text-off {
        opacity: 0;
        transform: translateY(-50%) translateX(10px);
    }

    /* Hide default HTML checkbox */
    .switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    /* The slider */
    .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: white;
        border-radius: 50px;
        box-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.215, 0.610, 0.355, 1);
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 1.4em;
        width: 1.4em;
        right: 0.3em;
        bottom: 0.3em;
        transform: translateX(150%);
        background-color: #ffe100;
        border-radius: inherit;
        transition: all 0.4s cubic-bezier(0.215, 0.610, 0.355, 1);
    }

    .slider:after {
        position: absolute;
        content: "";
        height: 1.4em;
        width: 1.4em;
        left: 0.3em;
        bottom: 0.3em;
        background-color: #0041a4;
        border-radius: inherit;
        transition: all 0.4s cubic-bezier(0.215, 0.610, 0.355, 1);
    }

    .switch input:focus+.slider {
        box-shadow: 0 0 5px #0041a4;
    }

    .switch input:checked+.slider:before {
        transform: translateY(0);
    }

    .switch input:checked+.slider::after {
        transform: translateX(-150%);
    }
</style>
