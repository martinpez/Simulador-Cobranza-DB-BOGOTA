<html lang="es">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="index.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .container-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 50px;

        }

        .btn-bogotaFun {
            background-color: rgb(0, 0, 128);
            color: #ffffff;
            border-radius: 14px;
            padding: 10px 14px;
            width: 300px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn-bogotaFun:hover {
            scale: 1.1;
            background-color: rgba(0, 0, 0, 0.992);
            color: rgb(237, 231, 231);
            box-shadow: rgb(213, 189, 70) 6px 4px 6px 0px;
        }



        .btn-bogotaFunEnv {
            background-color: rgb(0, 0, 128);
            color: #ffffff;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 16px;
            width: 300px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.2s;
        }

        .btn-bogotaFunEnv:hover {
            transform: scale(1.05);
            background-color: rgba(0, 0, 0, 0.992);
            color: rgb(237, 231, 231);
            box-shadow: rgb(213, 189, 70) 6px 4px 6px 0px;
        }

        .btn-bogotaFunEnv:active {
            transform: scale(0.95);
            background-color: rgb(0, 0, 0);
            box-shadow: rgb(213, 189, 70) 2px 2px 4px 0px;
        }
    </style>
</head>

<body>
    <div class="container-buttons">
        <button id="btnEvnFun" class="btn btn-bogotaFun">Ver Fun
            📖</button>
        <button onclick="this.innerHTML='Enviando .. 📨'; " id="btnconfirmar" class="btn btn-bogotaFunEnv">Enviar Fun
        </button>
    </div>

</body>

</html>
